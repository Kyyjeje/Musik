<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Buat Kamu 💖</title>
<style>
    body {
        text-align: center;
        font-family: Arial;
        background: #ffe6f0;
        overflow: hidden;
    }
    h1 {
        color: #ff4d88;
    }
    .btn {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
    }
    .yes {
        background: #ff4d88;
        color: white;
    }
    .no {
        background: #ccc;
    }
</style>
</head>

<body>

<h1 id="text">Aku Mau Nanya Nih 😳</h1>

<p>Kamu sayang aku gak? 💖</p>

<button class="btn yes" onclick="jawabYa()">Sayang 💕</button>
<button class="btn no" onmouseover="kabur(this)">Enggak 😝</button>

<script>
function jawabYa() {
    document.getElementById("text").innerHTML = "Yeeay! Aku juga sayang kamu 🥰💖";
}

function kabur(btn) {
    btn.style.position = "absolute";
    btn.style.top = Math.random() * window.innerHeight + "px";
    btn.style.left = Math.random() * window.innerWidth + "px";
}
</script>

</body>
</html>
